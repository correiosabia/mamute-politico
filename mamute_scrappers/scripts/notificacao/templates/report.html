<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{SUBJECT}}</title>
  <style>
    body { margin: 0; font-family: Barlow, Tahoma, Helvetica, Verdana, sans-serif; line-height: 1.5; }
    .page { background: #f4f4f4; padding: 20px 0; }
    .card { max-width: 600px; margin: 0 auto; background: #fff; border-collapse: collapse; }
    .section { padding: 20px 30px; color: #444; font-size: 16px; }
    .logo-header { padding: 28px 30px 12px; text-align: center; }
    h1 { color: #111; font-size: 24px; margin: 0 0 12px; }
    h2 { color: #111; font-size: 18px; margin: 24px 0 8px; }
    .muted { color: #878787; font-size: 14px; }
    .footer { background: #eee; padding: 20px; font-size: 14px; text-align: center; }
    .legal { padding: 20px; font-size: 11px; text-align: center; color: #666; }
  </style>
</head>
<body>
  <table class="page" width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td>
        <table class="card" width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td class="logo-header">
              <img src="{{LOGO_URL}}" width="220" alt="Mamute Político" style="display:block; margin:0 auto;">
            </td>
          </tr>
          <tr>
            <td class="section">
              <h1>{{SUBJECT}}</h1>
              <p>Olá, <strong>{{GREETING_NAME}}</strong>.</p>
              <p>{{INTRO}}</p>
              {{TEST_NOTICE}}
            </td>
          </tr>
          <tr>
            <td class="section">
              <h2>Parlamentares monitorados</h2>
              {{PARLIAMENTARIANS}}
            </td>
          </tr>
          <tr>
            <td class="section">
              <h2>Resumo do período</h2>
              <p style="margin:0 0 4px;font-size:14px;color:#6b7280;">{{PERIOD_LABEL}}</p>
              {{STATS_SUMMARY}}
            </td>
          </tr>
          <tr>
            <td class="section">
              <h2>Destaques recentes</h2>
              {{HIGHLIGHTS}}
            </td>
          </tr>
          <tr>
            <td class="footer">
              {{FOOTER}}
            </td>
          </tr>
          <tr>
            <td class="legal">
              <a href="{{PRIVACY_URL}}">Política de privacidade</a>
              ·
              <a href="{{MANAGE_URL}}">Gerenciar monitoramento</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
