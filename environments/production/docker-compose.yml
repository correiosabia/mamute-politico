name: prod-mamute-politico

services:

  mamute-politico-api:
    build:
      context: ../../api
      dockerfile: Dockerfile
    image: mamute-politico-api:latest
    container_name: prod-mamute-politico-api
    volumes:
      - ../../api/.env:/app/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
      - frontend
    depends_on:
      pgvector-db:
        condition: service_healthy
    restart: unless-stopped

  mamute-politico-chatbot:
    build:
      context: ../../chatbot_backend
      dockerfile: Dockerfile
    image: mamute-politico-chatbot:latest
    container_name: prod-mamute-politico-chatbot

    volumes:
      - ../../chatbot_backend/.env:/app/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
      - frontend
    depends_on:
      pgvector-db:
        condition: service_healthy
    restart: unless-stopped

  mamute-politico-scrappers:
    build:
      context: ../../mamute_scrappers
      dockerfile: Dockerfile
    image: mamute-politico-scrappers:latest
    container_name: prod-mamute-politico-scrappers
    volumes:
      - ../../mamute_scrappers/.env:/app/.env
      - scrappers_state:/app/state
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    depends_on:
      pgvector-db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
    restart: unless-stopped

  ghost-db:
    container_name: prod-mamute-politico-ghost-db
    image: mysql:8.0
    environment:
      # TODO: Remove hardcoded values
      MYSQL_ROOT_PASSWORD: ${GHOST_DB_PASSWORD:-change_me}
      MYSQL_DATABASE: ghost
    volumes:
      - ghost_db_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  ghost:
    container_name: prod-mamute-politico-ghost
    image: ghost:latest
    environment:
      url: ${PUBLIC_URL:-http://localhost}
      NODE_ENV: production
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: root
      database__connection__password: ${GHOST_DB_PASSWORD}
      database__connection__database: ghost
      # Transactional email (magic links, staff invites, password reset) via Mailgun SMTP.
      # Bulk newsletters continuam pelo Mailgun HTTP API configurado em Settings > Email Newsletter (DB).
      mail__transport: SMTP
      mail__options__service: Mailgun
      mail__options__host: smtp.mailgun.org
      mail__options__port: "587"
      mail__options__secure: "false"
      mail__options__auth__user: ${MAILGUN_SMTP_USER}
      mail__options__auth__pass: ${MAILGUN_SMTP_PASS}
      mail__from: ${GHOST_MAIL_FROM:-Mamute Politico <noreply@mamutepolitico.com.br>}
      # Desliga a verificação de dispositivo novo no login de staff/admin do Ghost.
      # Não tem relação com o magic link de membro — sobrescreve o staffDeviceVerification:true
      # do config.production.json (env > file no nconf do Ghost).
      security__staffDeviceVerification: "false"
    volumes:
      - ghost_content:/var/lib/ghost/content
    networks:
      - frontend
      - backend
    depends_on:
      ghost-db:
        condition: service_healthy
    restart: unless-stopped

  ui:
    container_name: prod-mamute-politico-ui
    build:
      context: ../../ui
      dockerfile: Dockerfile
      # Vite inlina VITE_* em build time. Aqui ficam vazios por padrao -> codigo cai no
      # fallback same-origin (/api, /members) que Caddy ja roteia. Setar so se for
      # separar UI da API em hosts diferentes.
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-}
        VITE_GHOST_JWKS: ${VITE_GHOST_JWKS:-}
    networks:
      - frontend
    restart: unless-stopped

  pgvector-db:
    container_name: prod-mamute-politico-pgvector-db
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_DB: ${PGVECTOR_DB_NAME:-mamute_vectors_prod}
      POSTGRES_USER: ${PGVECTOR_DB_USER:-mamute}
      POSTGRES_PASSWORD: ${PGVECTOR_DB_PASSWORD:-change_me}
    volumes:
      - pgvector_db_data:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_DB_USER:-mamute} -d ${PGVECTOR_DB_NAME:-mamute_vectors_prod}"]
      interval: 5s
      retries: 10
    restart: unless-stopped

networks:
  frontend:
    name: mamute-politico-ui-prod-frontend
  backend:
    name: mamute-politico-ui-prod-backend

volumes:
  caddy_data:
  caddy_config:
  ghost_content:
  ghost_db_data:
  pgvector_db_data:
  scrappers_state:
